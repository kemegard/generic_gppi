# Disable Zephyr GPIO driver (we're using nrfx directly)
CONFIG_GPIO=n

# Logging configuration
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Enable NRFX drivers for GPIOTE20 and GPPI
CONFIG_NRFX_GPIOTE20=y
CONFIG_NRFX_GPPI=y

# Main stack size
CONFIG_MAIN_STACK_SIZE=2048
